<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五十音達人 Kana Master</title>
    <style>
        :root {
            --primary-blue: #A2D2FF;
            --bg-color: #F8F9FA;
            --text-dark: #2B2D42;
            --card-bg: #FFFFFF;
            --success: #34C759;
            --danger: #FF3B30;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-color);
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* 頁面切換設定 */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 標題區 */
        header { text-align: left; margin-bottom: 30px; margin-top: 20px;}
        header h2 { margin: 0; font-size: 14px; color: #8E8E93; text-transform: uppercase; letter-spacing: 1px;}
        header h1 { margin: 5px 0 0 0; font-size: 32px; font-weight: 800; color: var(--text-dark);}

        /* 卡片設計 */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .score-card {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .score-circle {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 6px solid var(--primary-blue);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; color: var(--text-dark);
        }
        .score-circle span { font-size: 10px; color: #8E8E93; font-weight: normal;}

        /* 按鈕設計 */
        .btn-primary {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(162, 210, 255, 0.4);
            transition: transform 0.1s;
        }
        .btn-primary:active { transform: scale(0.97); }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--text-dark);
            border: 2px solid #E5E5EA;
            border-radius: 16px;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 測驗畫面 */
        .quiz-nav { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-bottom: 20px;}
        .timer { color: var(--danger); }
        .question-box {
            background-color: var(--card-bg);
            border-radius: 24px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn {
            background-color: var(--card-bg);
            border: 2px solid #E5E5EA;
            border-radius: 16px;
            padding: 25px 0;
            font-size: 32px;
            font-weight: bold;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn.correct { background-color: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong { background-color: var(--danger); color: white; border-color: var(--danger); }

        /* 結果列表與表格 */
        .result-list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        .result-list li {
            padding: 12px; border-bottom: 1px solid #F2F2F7;
            display: flex; justify-content: space-between;
        }
        .kana-table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; }
        .kana-table th { background-color: #F2F2F7; padding: 10px; position: sticky; top: 0; }
        .kana-table td { padding: 12px 5px; border-bottom: 1px solid #F2F2F7; }

        footer { text-align: center; margin-top: 40px; font-size: 12px; color: #AEAEB2; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="page-home" class="page active">
        <header>
            <h2>Kana Master</h2>
            <h1>五十音達人</h1>
        </header>

        <div class="card score-card">
            <div class="score-circle">
                <div id="high-score-display" style="font-size: 24px;">0</div>
                <span>最高分</span>
            </div>
            <div>
                <h3 style="margin: 0 0 5px 0; color: #8E8E93; font-size: 14px;">太棒了！</h3>
                <h2 style="margin: 0; font-size: 18px;">準備好挑戰自己了嗎？</h2>
            </div>
        </div>

        <button class="btn-primary" onclick="startGame()">⏱️ 1 分鐘極速挑戰</button>
        <button class="btn-secondary" onclick="showPage('table')">📖 五十音學習與對照表</button>

        <footer>Powered by GitHub Pages</footer>
    </div>

    <div id="page-quiz" class="page">
        <div class="quiz-nav">
            <div>得分: <span id="score-display">0</span></div>
            <div class="timer">⏳ <span id="time-display">60</span>s</div>
        </div>
        
        <div class="question-box" id="question-display">あ</div>
        
        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="page-result" class="page">
        <header style="text-align: center;">
            <h2>Time's Up!</h2>
            <h1>挑戰結束</h1>
        </header>

        <div class="card" style="text-align: center;">
            <p style="color: #8E8E93; margin: 0;">本次獲得分數</p>
            <h1 style="font-size: 48px; color: var(--primary-blue); margin: 10px 0;" id="final-score">0</h1>
        </div>

        <div class="card">
            <h3 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">🎯 答對配對紀錄</h3>
            <ul class="result-list" id="correct-answers-list"></ul>
        </div>

        <button class="btn-primary" onclick="goHome()">返回首頁</button>
    </div>

    <div id="page-table" class="page">
        <header>
            <h2>Review</h2>
            <h1>五十音對照表</h1>
        </header>

        <div class="card" style="padding: 0; overflow: hidden; max-height: 400px; overflow-y: auto;">
            <table class="kana-table">
                <thead><tr><th>平假名</th><th>片假名</th><th>羅馬音</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <button class="btn-secondary" onclick="goHome()">返回首頁</button>
    </div>

</div>

<script>
    // 完整題庫資料
    const kanaData = [
        {h:'あ', k:'ア', r:'a'}, {h:'い', k:'イ', r:'i'}, {h:'う', k:'ウ', r:'u'}, {h:'え', k:'エ', r:'e'}, {h:'お', k:'オ', r:'o'},
        {h:'か', k:'カ', r:'ka'}, {h:'き', k:'キ', r:'ki'}, {h:'く', k:'ク', r:'ku'}, {h:'け', k:'ケ', r:'ke'}, {h:'こ', k:'コ', r:'ko'},
        {h:'さ', k:'サ', r:'sa'}, {h:'し', k:'シ', r:'shi'}, {h:'す', k:'ス', r:'su'}, {h:'せ', k:'セ', r:'se'}, {h:'そ', k:'ソ', r:'so'},
        {h:'た', k:'タ', r:'ta'}, {h:'ち', k:'チ', r:'chi'}, {h:'つ', k:'ツ', r:'tsu'}, {h:'て', k:'テ', r:'te'}, {h:'と', k:'ト', r:'to'},
        {h:'な', k:'ナ', r:'na'}, {h:'に', k:'ニ', r:'ni'}, {h:'ぬ', k:'ヌ', r:'nu'}, {h:'ね', k:'ネ', r:'ne'}, {h:'の', k:'ノ', r:'no'},
        {h:'は', k:'ハ', r:'ha'}, {h:'ひ', k:'ヒ', r:'hi'}, {h:'ふ', k:'フ', r:'fu'}, {h:'へ', k:'ヘ', r:'he'}, {h:'ほ', k:'ホ', r:'ho'},
        {h:'ま', k:'マ', r:'ma'}, {h:'み', k:'ミ', r:'mi'}, {h:'む', k:'ム', r:'mu'}, {h:'め', k:'メ', r:'me'}, {h:'も', k:'モ', r:'mo'},
        {h:'や', k:'ヤ', r:'ya'}, {h:'ゆ', k:'ユ', r:'yu'}, {h:'よ', k:'ヨ', r:'yo'},
        {h:'ら', k:'ラ', r:'ra'}, {h:'り', k:'リ', r:'ri'}, {h:'る', k:'ル', r:'ru'}, {h:'れ', k:'レ', r:'re'}, {h:'ろ', k:'ロ', r:'ro'},
        {h:'わ', k:'ワ', r:'wa'}, {h:'を', k:'ヲ', r:'wo'}, {h:'ん', k:'ン', r:'n'},
        {h:'が', k:'ガ', r:'ga'}, {h:'ぎ', k:'ギ', r:'gi'}, {h:'ぐ', k:'グ', r:'gu'}, {h:'げ', k:'ゲ', r:'ge'}, {h:'ご', k:'ゴ', r:'go'},
        {h:'ざ', k:'ザ', r:'za'}, {h:'じ', k:'ジ', r:'ji'}, {h:'ず', k:'ズ', r:'zu'}, {h:'ぜ', k:'ゼ', r:'ze'}, {h:'ぞ', k:'ゾ', r:'zo'},
        {h:'だ', k:'ダ', r:'da'}, {h:'ぢ', k:'ヂ', r:'ji'}, {h:'づ', k:'ヅ', r:'zu'}, {h:'で', k:'デ', r:'de'}, {h:'ど', k:'ド', r:'do'},
        {h:'ば', k:'バ', r:'ba'}, {h:'び', k:'ビ', r:'bi'}, {h:'ぶ', k:'ブ', r:'bu'}, {h:'べ', k:'ベ', r:'be'}, {h:'ぼ', k:'ボ', r:'bo'},
        {h:'ぱ', k:'パ', r:'pa'}, {h:'ぴ', k:'ピ', r:'pi'}, {h:'ぷ', k:'プ', r:'pu'}, {h:'ぺ', k:'ペ', r:'pe'}, {h:'ぽ', k:'ポ', r:'po'}
    ];

    let score = 0, timer, timeLeft = 60;
    let currentQ = {}, isWaiting = false;
    let correctHistory = {}, highScore = 0;

    // 讀取本地最高分
    try { highScore = localStorage.getItem('kanaMasterScore') || 0; } catch (e) {}
    document.getElementById('high-score-display').textContent = highScore;

    // 初始化對照表
    const tbody = document.getElementById('table-body');
    kanaData.forEach(item => {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td><strong>${item.h}</strong></td><td>${item.k}</td><td style="color:#8E8E93;">${item.r}</td>`;
        tbody.appendChild(tr);
    });

    // 頁面切換
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
    }

    // 開始遊戲
    function startGame() {
        score = 0; timeLeft = 60; correctHistory = {};
        document.getElementById('score-display').textContent = score;
        document.getElementById('time-display').textContent = timeLeft;
        showPage('quiz');
        nextQuestion();

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('time-display').textContent = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    // 產生題目
    function nextQuestion() {
        if (timeLeft <= 0) return;
        isWaiting = false;
        currentQ = kanaData[Math.floor(Math.random() * kanaData.length)];
        document.getElementById('question-display').textContent = currentQ.h;

        let options = [currentQ];
        while (options.length < 4) {
            let wrong = kanaData[Math.floor(Math.random() * kanaData.length)];
            if (!options.some(opt => opt.h === wrong.h)) options.push(wrong);
        }
        
        options.sort(() => Math.random() - 0.5);
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        options.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt.k;
            btn.onclick = () => checkAns(opt, btn);
            container.appendChild(btn);
        });
    }

    // 檢查答案
    function checkAns(opt, btn) {
        if (isWaiting) return;
        isWaiting = true;
        let allBtns = document.getElementById('options-container').querySelectorAll('.option-btn');

        if (opt.h === currentQ.h) {
            btn.classList.add('correct');
            score += 10;
            let key = `${currentQ.h} ➔ ${currentQ.k} (${currentQ.r})`;
            correctHistory[key] = (correctHistory[key] || 0) + 1;
            document.getElementById('score-display').textContent = score;
            setTimeout(nextQuestion, 300);
        } else {
            btn.classList.add('wrong');
            allBtns.forEach(b => { if (b.textContent === currentQ.k) b.classList.add('correct'); });
            setTimeout(nextQuestion, 1000);
        }
    }

    // 結束遊戲
    function endGame() {
        clearInterval(timer);
        if (score > highScore) {
            highScore = score;
            try { localStorage.setItem('kanaMasterScore', highScore); } catch(e){}
            document.getElementById('high-score-display').textContent = highScore;
        }

        document.getElementById('final-score').textContent = score;
        let list = document.getElementById('correct-answers-list');
        list.innerHTML = '';
        
        let entries = Object.entries(correctHistory).sort((a, b) => b[1] - a[1]);
        if (entries.length === 0) {
            list.innerHTML = '<li style="justify-content:center; color:#8E8E93;">這次沒有答對任何題目，再接再厲！💪</li>';
        } else {
            entries.forEach(([key, val]) => {
                let li = document.createElement('li');
                li.innerHTML = `<strong>${key}</strong> <span style="color:#A2D2FF; font-weight:bold;">x${val}</span>`;
                list.appendChild(li);
            });
        }
        showPage('result');
    }

    function goHome() { showPage('home'); }
</script>

</body>
</html>
